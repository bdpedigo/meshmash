site_name: meshmash
site_url: https://bdpedigo.github.io/meshmash/
repo_url: https://github.com/bdpedigo/meshmash/
repo_name: bdpedigo/meshmash
edit_uri: edit/main/docs/
nav:
  - index.md
  - install.md
  - API Reference: reference.md
  - CLI: cli.md
theme:
  name: material
  language: en
  palette:
    scheme: preference
    primary: black
    accent: indigo
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.footer
    - navigation.prune
    - navigation.tabs
    - navigation.tabs.sticky
    - content.action.edit
    - content.action.view
    - toc.follow
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
markdown_extensions:
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      linenums: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.inlinehilite
  - pymdownx.details
  - admonition
  - toc:
      baselevel: 1
      permalink: true
  - meta
watch:
  - src/meshmash
  - docs
plugins:
  - include-markdown
  - section-index
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pandas.pydata.org/pandas-docs/stable/objects.inv
            - https://docs.scipy.org/doc/scipy/objects.inv
            - https://scikit-learn.org/stable/objects.inv
            - https://docs.pyvista.org/objects.inv
            - https://joblib.readthedocs.io/en/latest/objects.inv
            - https://pymeshfix.pyvista.org/objects.inv
          options:
            members_order: source
            show_source: false
            docstring_style: numpy
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: false
            merge_init_into_class: true
            show_root_heading: true
            show_root_toc_entry: false
            show_object_full_path: false
            show_symbol_type_heading: false
            show_symbol_type_toc: false
            signature_crossrefs: true
